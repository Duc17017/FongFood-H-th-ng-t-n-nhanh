services:
  - type: web
    name: fongfood
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: 0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_URL
        value: https://foodappdb-5fe2e-default-rtdb.firebaseio.com/
      - key: GEMINI_API_KEY
        sync: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: ZALOPAY_APP_ID
        sync: false
      - key: ZALOPAY_KEY1
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false

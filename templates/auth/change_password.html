<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card-auth { width: 100%; max-width: 450px; border-radius: 15px; border: none; padding: 30px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-control { border-radius: 8px; padding: 10px; background: #f9f9f9; }
        .input-group-text { background: #f9f9f9; border-left: none; cursor: pointer; }
        .form-control { border-right: none; }
    </style>
</head>
<body>
<div class="card-auth">
    <div class="text-center mb-4 position-relative">
        <a href="/settings" class="position-absolute start-0 text-dark"><i class="fas fa-arrow-left"></i></a>
        <h5 class="fw-bold text-danger">ĐỔI MẬT KHẨU</h5>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 text-center small">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form action="/change-password" method="POST">
        <div class="mb-3">
            <label class="small fw-bold">Mật khẩu cũ</label>
            <div class="input-group">
                <input type="password" name="old_password" id="old" class="form-control" required>
                <span class="input-group-text" onclick="toggle('old')"><i class="fas fa-eye"></i></span>
            </div>
        </div>
        <div class="mb-3">
            <label class="small fw-bold">Mật khẩu mới</label>
            <div class="input-group">
                <input type="password" name="new_password" id="new" class="form-control" required minlength="8">
                <span class="input-group-text" onclick="toggle('new')"><i class="fas fa-eye"></i></span>
            </div>
        </div>
        <div class="mb-4">
            <label class="small fw-bold">Nhập lại mật khẩu mới</label>
            <div class="input-group">
                <input type="password" name="confirm_password" id="con" class="form-control" required minlength="8">
                <span class="input-group-text" onclick="toggle('con')"><i class="fas fa-eye"></i></span>
            </div>
        </div>
        <button class="btn btn-danger w-100 fw-bold py-2">XÁC NHẬN</button>
    </form>
</div>
<script>
    function toggle(id) {
        let x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
    }
</script>
</body>
</html>

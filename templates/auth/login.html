<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Fong Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* CSS Social (Giữ nguyên phần nút dọc bạn đã thích) */
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #999; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-social { 
            width: 100%; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            transition: 0.2s; margin-bottom: 10px; text-decoration: none; cursor: pointer;
        }
        .btn-google { border: 1px solid #ddd; background: white; color: #333; }
        .btn-facebook { background: #1877F2; color: white; border: none; }
        .btn-apple { background: black; color: white; border: none; }
    </style>
</head>
<body>
<div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px; border-radius: 15px;">
    <h3 class="text-center text-danger fw-bold mb-3">FONG FOOD</h3>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'danger' or category == 'error' else 'success' }} py-2 text-center small">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="fw-bold small">Tài khoản</label>
            <input type="text" name="username" class="form-control" placeholder="SĐT hoặc Tên đăng nhập" required>
        </div>
        
        <div class="mb-3">
            <label class="fw-bold small">Mật khẩu</label>
            <div class="input-group">
                <input type="password" name="password" id="loginPass" class="form-control" placeholder="Nhập mật khẩu" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPass', this)">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3">ĐĂNG NHẬP</button>
        
        <div class="divider">Hoặc đăng nhập bằng</div>
        <div>
            <button type="button" class="btn-social btn-google" onclick="alert('Tính năng đang phát triển!')"><i class="fab fa-google"></i> Google</button>
            <button type="button" class="btn-social btn-facebook" onclick="alert('Tính năng đang phát triển!')"><i class="fab fa-facebook-f"></i> Facebook</button>
            <button type="button" class="btn-social btn-apple" onclick="alert('Tính năng đang phát triển!')"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <div class="d-flex justify-content-between small mt-3">
            <a href="/register" class="text-decoration-none fw-bold">Đăng ký ngay</a>
            <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none fw-bold">Quên mật khẩu?</a>
        </div>
    </form>
</div>

<script>
    // Hàm bật/tắt xem mật khẩu (Dùng chung)
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash'); // Đổi sang icon mắt gạch chéo
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye'); // Đổi lại icon mắt mở
        }
    }
</script>
</body>
</html>

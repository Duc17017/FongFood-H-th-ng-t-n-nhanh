<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quét QR Đơn hàng - FONG FOOD Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { background: #1e293b; min-height: 100vh; }
        .scanner-wrapper {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .scanner-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .scanner-header {
            background: linear-gradient(135deg, #d32f2f 0%, #ff5252 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        #reader {
            width: 100%;
            border-radius: 0;
        }
        .scan-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .result-card.show { display: block; }
        .result-card.success { border-left: 4px solid #00b14f; }
        .result-card.error { border-left: 4px solid #dc3545; }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-shipping { background: #cce5ff; color: #004085; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="scanner-wrapper">
        <div class="scanner-card">
            <div class="scanner-header">
                <h5 class="mb-0"><i class="fas fa-qrcode me-2"></i>Quét mã QR đơn hàng</h5>
                <small>Admin - Quản lý đơn hàng nhanh</small>
            </div>
            
            <div id="reader"></div>
            
            <div class="p-3">
                <button class="scan-btn" id="startScan" onclick="startScanner()">
                    <i class="fas fa-camera me-2"></i> Bắt đầu quét
                </button>
                
                <div class="result-card" id="resultCard">
                    <!-- Kết quả sẽ hiển thị ở đây -->
                </div>
                
                <div class="text-center mt-3">
                    <a href="/admin/orders" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Quay lại
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let html5QrcodeScanner = null;
        
        function startScanner() {
            document.getElementById('startScan').innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Đang quét...';
            document.getElementById('startScan').disabled = true;
            
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: { width: 250, height: 250 } },
                false
            );
            
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }
        
        function onScanSuccess(decodedText, decodedResult) {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
            
            document.getElementById('startScan').style.display = 'none';
            
            fetch('/api/v1/qr/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_data: decodedText })
            })
            .then(res => res.json())
            .then(data => {
                const card = document.getElementById('resultCard');
                card.className = 'result-card show';
                
                if (data.success) {
                    card.classList.add('success');
                    
                    let statusClass = 'status-pending';
                    if (data.status === 'shipping') statusClass = 'status-shipping';
                    else if (data.status === 'completed') statusClass = 'status-completed';
                    else if (data.status === 'cancelled') statusClass = 'status-cancelled';
                    
                    let statusText = data.status;
                    if (statusText === 'pending') statusText = 'Chờ xử lý';
                    else if (statusText === 'shipping') statusText = 'Đang giao';
                    else if (statusText === 'completed') statusText = 'Hoàn tất';
                    else if (statusText === 'cancelled') statusText = 'Đã hủy';
                    
                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h6 class="mb-1">${data.order_id}</h6>
                                <small class="text-muted">${data.date || ''}</small>
                            </div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="mb-2">
                            <strong><i class="fas fa-user me-1"></i> Khách hàng:</strong> ${data.customer_name || 'Khách lẻ'}
                        </div>
                        
                        <div class="mb-2">
                            <strong><i class="fas fa-money-bill me-1"></i> Tổng tiền:</strong> 
                            <span class="text-danger fw-bold">${data.total ? data.total.toLocaleString() + ' đ' : '0 đ'}</span>
                        </div>
                        
                        <div class="mb-3">
                            <strong><i class="fas fa-credit-card me-1"></i> Thanh toán:</strong> ${data.paymentStatus || 'Chưa thanh toán'}
                        </div>
                        
                        <div class="d-flex gap-2">
                            <a href="/admin/order/${data.order_id}" class="btn btn-primary flex-grow-1">
                                <i class="fas fa-eye me-1"></i> Xem chi tiết
                            </a>
                            <button onclick="scanAgain()" class="btn btn-outline-secondary">
                                <i class="fas fa-qrcode"></i>
                            </button>
                        </div>
                    `;
                } else {
                    card.classList.add('error');
                    card.innerHTML = `
                        <div class="text-center">
                            <i class="fas fa-times-circle text-danger" style="font-size: 48px;"></i>
                            <h6 class="mt-3">Mã QR không hợp lệ</h6>
                            <p class="text-muted mb-3">${data.message || 'Đơn hàng không tồn tại'}</p>
                            <button onclick="scanAgain()" class="btn btn-primary">
                                <i class="fas fa-qrcode me-1"></i> Quét lại
                            </button>
                        </div>
                    `;
                }
            })
            .catch(err => {
                const card = document.getElementById('resultCard');
                card.className = 'result-card show error';
                card.innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-wifi text-danger" style="font-size: 48px;"></i>
                        <h6 class="mt-3">Lỗi kết nối</h6>
                        <p class="text-muted mb-3">Không thể kết nối server</p>
                        <button onclick="scanAgain()" class="btn btn-primary">
                            <i class="fas fa-qrcode me-1"></i> Thử lại
                        </button>
                    </div>
                `;
            });
        }
        
        function onScanFailure(error) {
            // console.warn
        }
        
        function scanAgain() {
            document.getElementById('resultCard').className = 'result-card';
            document.getElementById('resultCard').innerHTML = '';
            document.getElementById('startScan').style.display = 'block';
            document.getElementById('startScan').innerHTML = '<i class="fas fa-camera me-2"></i> Bắt đầu quét';
            document.getElementById('startScan').disabled = false;
        }
    </script>
</body>
</html>

{% extends "layout.html" %}

{% block content %}
<style>
    .social-item {
        background: white; padding: 15px; border-bottom: 1px solid #eee;
        display: flex; align-items: center; justify-content: space-between;
    }
    .social-left { display: flex; align-items: center; gap: 15px; }
    .s-logo { width: 30px; height: 30px; object-fit: contain; }
    /* Switch toggle custom */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #D32F2F; }
    input:checked + .slider:before { transform: translateX(20px); }
</style>

<div class="bg-white border-bottom p-3 mb-2 sticky-top">
    <div class="position-relative text-center">
        <a href="/settings" class="position-absolute start-0 text-dark"><i class="fas fa-arrow-left"></i></a>
        <h6 class="m-0 fw-bold">LIÊN KẾT TÀI KHOẢN</h6>
    </div>
</div>

<div class="container-fluid px-0">
    <div class="social-item">
        <div class="social-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/768px-Google_%22G%22_logo.svg.png" class="s-logo">
            <div>
                <div class="fw-bold fs-6">Google</div>
                <div class="small text-muted">Chưa liên kết</div>
            </div>
        </div>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <div class="social-item">
        <div class="social-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png" class="s-logo">
            <div>
                <div class="fw-bold fs-6">Facebook</div>
                <div class="small text-success">Đã liên kết</div>
            </div>
        </div>
        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    </div>

    <div class="social-item">
        <div class="social-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="s-logo">
            <div>
                <div class="fw-bold fs-6">Apple ID</div>
                <div class="small text-muted">Chưa liên kết</div>
            </div>
        </div>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>
</div>
{% endblock %}

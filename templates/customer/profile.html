{% extends "layout.html" %}

{% block content %}
<style>
    :root {
        --primary-color: #D32F2F;
        --primary-light: #FF5252;
        --primary-dark: #B71C1C;
        --accent-color: #FFD700;
        --success-color: #00B14F;
        --text-dark: #1a1a1a;
        --text-muted: #6c757d;
        --text-light: #f8f9fa;
        --bg-light: #f5f7fa;
        --bg-white: #ffffff;
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
        --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
        --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
        --gradient-primary: linear-gradient(135deg, #D32F2F 0%, #FF5252 100%);
        --border-radius-sm: 8px;
        --border-radius-md: 12px;
        --border-radius-lg: 16px;
        --border-radius-xl: 24px;
        --transition-fast: 0.2s ease;
        --transition-normal: 0.3s ease;
    }

    .ai-fade-in { animation: aiFadeIn 0.5s ease forwards; }
    .ai-slide-up { animation: aiSlideUp 0.5s ease forwards; }

    @keyframes aiFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes aiSlideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Profile Container */
    .profile-container {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
    }

    .profile-card {
        background: var(--bg-white);
        border-radius: var(--border-radius-xl);
        box-shadow: var(--shadow-md);
        overflow: hidden;
    }

    .profile-header {
        position: relative;
        text-align: center;
        padding: 25px 20px 15px;
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
        color: white;
    }

    .back-btn {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-decoration: none;
        transition: all var(--transition-fast);
        backdrop-filter: blur(5px);
    }

    .back-btn:hover {
        background: rgba(255,255,255,0.3);
        transform: translateY(-50%) scale(1.05);
    }

    .profile-header h5 {
        font-weight: 700;
        font-size: 18px;
        margin: 0;
    }

    /* Avatar */
    .avatar-section {
        text-align: center;
        margin-top: -70px;
        padding-bottom: 25px;
        position: relative;
        z-index: 10;
    }

    .avatar-wrapper {
        position: relative;
        display: inline-block;
    }

    .avatar-preview {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 5px solid #FFD700;
        box-shadow: 0 8px 30px rgba(211, 47, 47, 0.25);
        overflow: hidden;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        transition: all var(--transition-normal);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
        font-weight: 800;
        color: #1e293b;
    }

    .avatar-preview:hover {
        transform: scale(1.08);
        box-shadow: 0 12px 40px rgba(211, 47, 47, 0.35);
    }

    .avatar-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .avatar-edit-btn {
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 3px solid white;
        transition: all var(--transition-fast);
        box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
    }

    .avatar-edit-btn:hover {
        transform: scale(1.15);
        background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-color) 100%);
    }

    .upload-note {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 15px;
        background: rgba(0,0,0,0.03);
        padding: 8px 16px;
        border-radius: 20px;
        display: inline-block;
    }

    /* Form */
    .profile-form {
        padding: 25px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label-custom {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 8px;
        color: var(--text-dark);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form-label-custom i {
        color: var(--primary-color);
        font-size: 14px;
    }

    .form-control-custom {
        border-radius: var(--border-radius-md);
        border: 2px solid #e9ecef;
        padding: 12px 15px;
        font-size: 14px;
        transition: all var(--transition-fast);
        background: var(--bg-white);
    }

    .form-control-custom:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        outline: none;
    }

    .form-control-custom:disabled,
    .input-disabled {
        background-color: #f8f9fa !important;
        color: var(--text-muted);
        cursor: not-allowed;
    }

    .input-icon-wrapper {
        position: relative;
    }

    .input-icon-wrapper i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
    }

    .input-icon-wrapper .form-control-custom {
        padding-left: 42px;
    }

    .locked-input {
        background: linear-gradient(90deg, #f8f9fa 0%, #f8f9fa 90%, transparent 100%);
    }

    /* Gender Selection */
    .gender-options {
        display: flex;
        gap: 15px;
        margin-top: 5px;
    }

    .gender-option {
        flex: 1;
        position: relative;
    }

    .gender-option input {
        position: absolute;
        opacity: 0;
        cursor: pointer;
    }

    .gender-label {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border: 2px solid #e9ecef;
        border-radius: var(--border-radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-weight: 500;
    }

    .gender-option input:checked + .gender-label {
        border-color: var(--primary-color);
        background: rgba(211, 47, 47, 0.05);
        color: var(--primary-color);
    }

    .gender-label:hover {
        border-color: var(--primary-light);
    }

    .gender-label i {
        margin-right: 8px;
    }

    /* Submit Button */
    .btn-save-red {
        background: var(--gradient-primary);
        color: white;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: var(--border-radius-md);
        margin-top: 10px;
        font-size: 14px;
        transition: all var(--transition-normal);
        box-shadow: 0 4px 15px rgba(211, 47, 47, 0.3);
    }

    .btn-save-red:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(211, 47, 47, 0.4);
    }

    .btn-save-red:active {
        transform: translateY(0);
    }

    /* Success Message */
    .success-message {
        background: #E8F5E9;
        color: var(--success-color);
        padding: 12px 20px;
        border-radius: var(--border-radius-md);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: aiSlideUp 0.3s ease;
    }

    /* Responsive */
    @media (max-width: 576px) {
        .profile-container {
            padding: 10px;
        }
        .profile-form {
            padding: 20px 15px;
        }
    }

    /* Menu Cards */
    .menu-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: white;
        border-radius: 12px;
        padding: 20px 10px;
        text-decoration: none;
        color: #1e293b;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        transition: all 0.2s;
    }
    .menu-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .menu-card i {
        font-size: 24px;
        color: #d32f2f;
        margin-bottom: 8px;
    }
    .menu-card span {
        font-size: 12px;
        font-weight: 600;
    }
</style>

<div class="profile-container ai-slide-up">
    
    <!-- Menu Items -->
    <div class="row g-2 mb-3">
        <div class="col-6">
            <a href="/history" class="menu-card text-center">
                <i class="fas fa-shopping-bag"></i>
                <span>Đơn hàng</span>
            </a>
        </div>
        <div class="col-6">
            <a href="/qr-scan" class="menu-card text-center">
                <i class="fas fa-qrcode"></i>
                <span>Quét mã</span>
            </a>
        </div>
        <div class="col-6">
            <a href="/address" class="menu-card text-center">
                <i class="fas fa-map-marker-alt"></i>
                <span>Địa chỉ</span>
            </a>
        </div>
        <div class="col-6">
            <a href="/settings" class="menu-card text-center">
                <i class="fas fa-cog"></i>
                <span>Cài đặt</span>
            </a>
        </div>
        <div class="col-6">
            <a href="/support" class="menu-card text-center">
                <i class="fas fa-headset"></i>
                <span>Hỗ trợ</span>
            </a>
        </div>
        <div class="col-6">
            <a href="/my_vouchers" class="menu-card text-center">
                <i class="fas fa-ticket-alt"></i>
                <span>Voucher của tôi</span>
            </a>
        </div>
    </div>

    <div class="profile-card">
        <div class="profile-header">
            <a href="/home" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h5><i class="fas fa-user-circle me-2"></i>THÔNG TIN TÀI KHOẢN</h5>
        </div>

        <form action="/update_profile" method="POST" enctype="multipart/form-data" class="ai-fade-in">
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <div class="avatar-preview">
                        {% if user.avatar %}
                            <img id="imagePreview" src="{{ user.avatar }}" alt="Avatar">
                        {% else %}
                            <img id="imagePreview" src="https://ui-avatars.com/api/?name={{ user.name }}&background=random&size=200" alt="Avatar">
                        {% endif %}
                    </div>
                    <label for="imageUpload" class="avatar-edit-btn" title="Thay đổi ảnh">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type='file' id="imageUpload" name="avatar" accept=".png, .jpg, .jpeg" style="display:none;" onchange="previewImage(this);" />
                </div>
                <div class="upload-note">
                    <i class="fas fa-info-circle me-1"></i>
                    Dung lượng tối đa 1MB - Định dạng: JPEG, PNG
                </div>
            </div>

            <div class="profile-form">
                <!-- Success Message (hidden by default) -->
                <div id="successMessage" class="success-message" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    <span>Cập nhật thông tin thành công!</span>
                </div>

                <!-- Name -->
                <div class="form-group">
                    <label class="form-label-custom">
                        <i class="fas fa-user"></i> Họ và tên
                    </label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control form-control-custom" name="name" value="{{ user.name }}" placeholder="Nhập họ và tên">
                    </div>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label class="form-label-custom">
                        <i class="fas fa-phone"></i> Số điện thoại
                    </label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="text" class="form-control form-control-custom" value="{{ user.username }}" disabled>
                    </div>
                </div>

                <!-- Email (Locked) -->
                <div class="form-group">
                    <label class="form-label-custom">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control form-control-custom locked-input" name="email" value="{{ user.email }}" readonly>
                        <i class="fas fa-lock" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--success-color);"></i>
                    </div>
                </div>

                <!-- DOB & Gender -->
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label-custom">
                                <i class="fas fa-calendar"></i> Ngày sinh
                            </label>
                            <input type="date" class="form-control form-control-custom" name="dob" value="{{ user.get('dob', '') }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label-custom d-block">
                                <i class="fas fa-venus-mars"></i> Giới tính
                            </label>
                            <div class="gender-options">
                                <div class="gender-option">
                                    <input class="gender-radio" type="radio" name="gender" id="genderMale" value="Nam" {{ 'checked' if user.get('gender') == 'Nam' else '' }}>
                                    <label for="genderMale" class="gender-label">
                                        <i class="fas fa-male"></i> Nam
                                    </label>
                                </div>
                                <div class="gender-option">
                                    <input class="gender-radio" type="radio" name="gender" id="genderFemale" value="Nữ" {{ 'checked' if user.get('gender') == 'Nữ' else '' }}>
                                    <label for="genderFemale" class="gender-label">
                                        <i class="fas fa-female"></i> Nữ
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-save-red">
                    <i class="fas fa-save me-2"></i> LƯU THAY ĐỔI
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Show success message after form submission
    const form = document.querySelector('form');
    if (form) {
        form.addEventListener('submit', function(e) {
            // Allow form submission - this is just for demo
            console.log('Profile updating...');
        });
    }
</script>
{% endblock %}

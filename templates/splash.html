<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#B71C1C">
    <title>Fong Food - Đang khởi động...</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Hình nền toàn màn hình (Dùng ảnh đồ ăn chất lượng cao + Phủ màu đỏ mờ) */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: linear-gradient(135deg, rgba(211, 47, 47, 0.92), rgba(183, 28, 28, 0.95)),
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070') center/cover no-repeat fixed;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Khung Glassmorphism (Hiệu ứng kính mờ - Giúp PC nhìn không bị trống) */
        .splash-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 50px 40px;
            width: 85%;
            max-width: 380px; /* Khóa kích thước trên PC để khung luôn đẹp */
            text-align: center;
            
            /* Hiệu ứng trượt lên khi mở web */
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Logo và Text */
        .logo-icon {
            font-size: 70px;
            color: white;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
            animation: pulse 2s infinite;
        }

        .app-name {
            color: white;
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .tagline {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            font-weight: 500;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Thanh Load dữ liệu xịn sò */
        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-top: 40px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #FFD700; /* Màu vàng nổi bật trên nền đỏ */
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: loadProgress 2.4s ease-in-out forwards;
        }

        /* Chữ loading nhấp nháy */
        .loading-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        /* Các hiệu ứng Animation */
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @keyframes loadProgress {
            0% { width: 0%; }
            40% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="splash-card">
        <i class="fa-solid fa-burger logo-icon"></i>
        <h1 class="app-name">FONG FOOD</h1>
        <div class="tagline">HƯƠNG VỊ ĐÁNH THỨC ĐAM MÊ</div>
        
        <div class="progress-wrapper">
            <div class="progress-bar"></div>
        </div>
        <div class="loading-text">Đang tải hệ thống...</div>
    </div>

    <script>
setTimeout(function(){
    window.location.href="/login"
},2000)
</script>
</body>
</html>
